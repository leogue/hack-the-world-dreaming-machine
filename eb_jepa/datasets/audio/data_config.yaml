# Audio dataset defaults — Speech Commands v2 (35-keyword spotting).
data_root: /lustre/work/pdl17890/udl806719/datasets/speech_commands_v2
sample_rate: 16000
n_classes: 35            # 35 keyword folders (excl. _background_noise_)
mode: raw               # raw ([1,16000]) | mel ([1,n_mels,T]) input representation
# mel front-end
n_mels: 64
n_fft: 400              # 25 ms @ 16 kHz
hop: 160               # 10 ms -> ~101 frames / 1 s
specaug: true          # mel-only SpecAugment on the SSL views
# waveform augmentation strengths (build the two SSL views)
shift_frac: 0.1        # random circular time-shift (fraction of 1 s)
gain_db: 6.0           # random gain +/- dB
noise_snr_db: [5.0, 30.0]   # additive Gaussian noise at random SNR (dB)
batch_size: 128
num_workers: 8
