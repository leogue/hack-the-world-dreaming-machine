# PointCloud dataset defaults (ModelNet40 3D point clouds).
data_root: /lustre/work/pdl17890/udl806719/datasets/modelnet40/modelnet40_ply_hdf5_2048
n_points: 1024           # points subsampled per view (shapes have 2048)
n_classes: 40            # ModelNet40 shape categories
batch_size: 128
num_workers: 8
# SSL augmentations (geometric) — `rotate` selects the invariance setting.
rotate: so3              # so3 (full view-invariance) | z (azimuth only) | none
jitter: 0.01
scale_lo: 0.8
scale_hi: 1.25
