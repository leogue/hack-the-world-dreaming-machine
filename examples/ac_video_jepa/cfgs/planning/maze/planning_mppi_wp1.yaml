# Piste #1b — waypoints A* à spacing=1 (test décisif).
# Chaque sous-but est une cellule ADJACENTE → zéro mur entre l'agent et la cible,
# régime purement local. Tranche : le world-model+MPPI savent-ils exécuter un
# chemin connu ? (succès) vs blocage d'exécution local même sans mur (échec).
logging:
  tqdm_silent: false
task_specification:
  goal_source: random_state
  obs: rgb
  waypoint_mode: true
  waypoint_spacing: 1        # sous-but = cellule adjacente
  waypoint_reach_cells: 0.5  # avance seulement quand EXACTEMENT sur la cellule
  stop_on_success: true
planner:
  planner_name: mppi
  num_act_stepped: 1
  plan_length: 6             # cible à 1 cellule → horizon très court
  n_iters: 20
  num_samples: 200
  num_elites: 20
  max_norms:
    - 2.45
  max_norm_dims:
    - 0
    - 1
  var_scale: 1.5
  decode_each_iteration: false
  planning_objective:
    objective_type: repr_dist
    sum_all_diffs: true
    alpha: 0.
ctxt_window_time: 1
