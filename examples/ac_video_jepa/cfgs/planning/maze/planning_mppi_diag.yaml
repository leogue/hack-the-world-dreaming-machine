# Diagnostic : à l'épisode 0, teste si le world-model prédit le bon déplacement
# 1-pas pour chaque action cardinale (vs ce que ferait l'env). Localise la panne.
logging:
  tqdm_silent: false
task_specification:
  goal_source: random_state
  obs: rgb
  diagnose: true
  stop_on_success: true
planner:
  planner_name: mppi
  snap_actions_to_grid: true
  num_act_stepped: 1
  plan_length: 8
  n_iters: 20
  num_samples: 200
  num_elites: 20
  max_norms:
    - 2.45
  max_norm_dims:
    - 0
    - 1
  var_scale: 1.5
  decode_each_iteration: false
  planning_objective:
    objective_type: repr_dist
    sum_all_diffs: true
    alpha: 0.
ctxt_window_time: 1
