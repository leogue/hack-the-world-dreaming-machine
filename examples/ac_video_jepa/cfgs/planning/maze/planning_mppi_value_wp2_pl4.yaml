# Learned-VALUE planning WITH A* waypoints (spacing=2) + action prior + snap —
# the success-oriented config, mirroring planning_mppi_probe_prior_wp1_pl4.yaml
# but with the TD-MPC learned value as the MPC cost instead of probe_pos.
# Lets us compare value-vs-probe under the SAME (proven) planner scaffolding.
logging:
  tqdm_silent: false
task_specification:
  goal_source: random_state
  obs: rgb
  waypoint_mode: true
  waypoint_spacing: 2
  waypoint_reach_cells: 0.5
  waypoint_action_prior: true
  stop_on_success: true
planner:
  planner_name: mppi
  snap_actions_to_grid: true
  num_act_stepped: 1
  plan_length: 4
  n_iters: 20
  num_samples: 200
  num_elites: 20
  max_norms:
    - 2.45
  max_norm_dims:
    - 0
    - 1
  var_scale: 1.5
  decode_each_iteration: false
  planning_objective:
    objective_type: learned_value
    sum_all_diffs: true
    gamma: 0.95
ctxt_window_time: 1
