# Piste #1 — sous-buts / waypoints A* (eval-only sur exp_long_h32).
# MPPI vise le PROCHAIN waypoint A* (~waypoint_spacing cellules) au lieu du but
# final → ramène le greedy repr_dist au régime local atteignable (pas de mur à
# contourner entre deux sous-buts consécutifs), là où il marchait pour two_rooms.
# Le world-model est inchangé (checkpoint Exp C) ; seul l'objectif de cible change.
logging:
  tqdm_silent: false
task_specification:
  goal_source: random_state # random_state or dset
  obs: rgb
  waypoint_mode: true
  waypoint_spacing: 4        # un sous-but tous les 4 cellules le long du chemin A*
  waypoint_reach_cells: 1.5  # avance au sous-but suivant dès qu'à <1.5 cellule
  stop_on_success: true      # termine l'épisode au but (mesure + temps)
planner:
  planner_name: mppi
  num_act_stepped: 1
  plan_length: 12            # horizon court : le sous-but est proche (~4 cellules)
  n_iters: 20
  num_samples: 200
  num_elites: 20
  max_norms:
    - 2.45
  max_norm_dims:
    - 0
    - 1
  var_scale: 1.5
  decode_each_iteration: false
  planning_objective:
    objective_type: repr_dist
    sum_all_diffs: true
    alpha: 0.
ctxt_window_time: 1
