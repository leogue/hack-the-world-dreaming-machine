# Channel-wise predictive world model (exp B) — per-channel prediction energy.
# ~30 min GPU on TUSZ normal (bckg-only). The energy localizes (channel x time).
meta:
  seed: 0
  ckpt_dir: /lustre/work/vivatech-dreamingmachines/lguerin/checkpoints/eeg/chan_energy
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUSZ_PREPROCESSED/edf
  split: train
  bckg_only: true
  n_channels: 19
  sfreq: 200
  frame_sec: 2.0
  seq_len: 16
  epoch_size: 20000
  batch_size: 64
  num_workers: 24
  norm: seq
model:
  out_dim: 128
  hidden: 32
  depth: 5
  action_dim: 1
  rnn_layers: 1
  std_coeff: 1.0
  cov_coeff: 1.0
optim:
  train_seconds: 1800      # ~30 min budget (warmup+cosine)
  warmup_seconds: 300
  epochs: 1000000
  lr: 0.001
  weight_decay: 1.0e-6
