# SOLID model A — two-view VICReg, ~3h single-GPU, seizure-free TUSZ.
# Bigger encoder + projector, time-budgeted warmup+cosine LR. Run in parallel with
# solid_sigreg.yaml (the other GPU) -> clean VICReg vs SIGReg at convergence (2 GPU total).
meta:
  seed: 0
  ckpt_dir: /lustre/work/vivatech-dreamingmachines/lguerin/checkpoints/eeg/solid_vicreg
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUSZ_PREPROCESSED/edf
  split: train
  bckg_only: true          # train on normal (seizure-free) recordings only
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 50000        # windows per "epoch" (checkpoint cadence ~once/minute)
  batch_size: 512
  num_workers: 28          # job runs with --cpus-per-task=32
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2
model:
  in_channels: 19
  out_dim: 512
  hidden: 128
  depth: 6
  projector: 512-4096-4096
  regularizer: vicreg
  std_coeff: 1.0
  cov_coeff: 1.0
optim:
  train_seconds: 10800     # ~3h budget; cosine LR completes over this window
  warmup_seconds: 600      # 10 min linear warmup
  epochs: 1000000          # high cap; the time budget is the real stop
  lr: 0.001                # peak LR (after warmup)
  weight_decay: 1.0e-6
