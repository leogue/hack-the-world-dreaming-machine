# SOLID model B — two-view SIGReg (BCS), ~3h single-GPU, seizure-free TUSZ.
# Identical encoder/protocol to solid_vicreg.yaml; only the anti-collapse regularizer
# differs (single lambda vs VICReg's two coeffs). Run on the 2nd GPU, in parallel.
meta:
  seed: 0
  ckpt_dir: /lustre/work/vivatech-dreamingmachines/lguerin/checkpoints/eeg/solid_sigreg
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUSZ_PREPROCESSED/edf
  split: train
  bckg_only: true
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 50000
  batch_size: 512
  num_workers: 28
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2
model:
  in_channels: 19
  out_dim: 512
  hidden: 128
  depth: 6
  projector: 512-4096-4096
  regularizer: sigreg
  lmbd: 10.0
  num_slices: 256
optim:
  train_seconds: 10800
  warmup_seconds: 600
  epochs: 1000000
  lr: 0.001
  weight_decay: 1.0e-6
