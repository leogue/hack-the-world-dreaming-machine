# H2 (clean) baseline — VICReg with NO projector (regularizer on the encoder directly).
# Healthy reference for the no-projector collapse run.
meta:
  seed: 0
  ckpt_dir: /lustre/work/vivatech-dreamingmachines/lguerin/checkpoints/eeg/bckg_noproj_vicreg
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUSZ_PREPROCESSED/edf
  split: train
  bckg_only: true
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000
  batch_size: 256
  num_workers: 16
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2
model:
  in_channels: 19
  out_dim: 256
  hidden: 64
  depth: 5
  projector: none          # <-- regularize the encoder output directly
  regularizer: vicreg
  std_coeff: 1.0
  cov_coeff: 1.0
optim:
  epochs: 20
  lr: 0.001
  weight_decay: 1.0e-6
