# Detection with BIPOLAR montage + 1-40 Hz bandpass (eeg-vjepa-style preprocessing).
# Same two-view VICReg recipe as bckg_vicreg, only the input preprocessing changes:
# read 19 referential -> bandpass 1-40 Hz -> double-banana bipolar (18 derivations).
meta:
  seed: 0
  ckpt_dir: /lustre/work/vivatech-dreamingmachines/lguerin/checkpoints/eeg/bipolar_vicreg
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUSZ_PREPROCESSED/edf
  split: train
  bckg_only: true
  n_channels: 19           # channels READ from the EDF (referential)
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000
  batch_size: 256
  num_workers: 24
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2
  montage: bipolar         # <-- 18 bipolar derivations
  band_low: 1.0            # <-- bandpass 1-40 Hz
  band_high: 40.0
model:
  in_channels: 18          # bipolar output channels (encoder input)
  out_dim: 256
  hidden: 64
  depth: 5
  projector: 256-2048-2048
  regularizer: vicreg
  std_coeff: 1.0
  cov_coeff: 1.0
optim:
  epochs: 20
  lr: 0.001
  weight_decay: 1.0e-6
